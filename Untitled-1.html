<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hari | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#0f172a;color:white;scroll-behavior:smooth;}

nav{
  display:flex;justify-content:space-between;
  padding:20px;background:#020617;
  position:sticky;top:0;
}

.hero{
  height:90vh;display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;
}

.hero h1{font-size:45px;}

.btn{
  margin-top:20px;padding:12px 25px;
  background:#38bdf8;color:black;
  border-radius:8px;text-decoration:none;
  font-weight:bold;
}

section{padding:70px 20px;text-align:center;}

.grid{display:flex;flex-wrap:wrap;justify-content:center;}

.card{
  background:#1e293b;padding:20px;margin:15px;
  border-radius:15px;width:300px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

/* IMAGES FIX */
.images{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.images img{
  width:80px;
  height:150px;
  object-fit:cover;
  margin:5px;
  border-radius:8px;
}

/* FORM */
input,textarea{
  width:80%;
  padding:12px;
  margin:10px;
  border:none;
  border-radius:5px;
}

button{
  padding:12px 25px;
  background:#38bdf8;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* SUCCESS TEXT */
.success{
  color:#4ade80;
  margin-top:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  font-size:22px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<nav>
  <h2>Hari</h2>
</nav>

<div class="hero">
  <h1>Hi, I'm Hari 👋</h1>
  <p>Flutter Developer</p>
  <a href="#contact" class="btn">Hire Me</a>
</div>

<section>
<h2>Projects</h2>

<div class="grid">

<div class="card">
<h3>Notes App</h3>
<div class="images">
<img src="https://source.unsplash.com/100x200/?app,notes">
<img src="https://source.unsplash.com/100x200/?mobile,ui">
<img src="https://source.unsplash.com/100x200/?dark,app">
<img src="https://source.unsplash.com/100x200/?task,app">
<img src="https://source.unsplash.com/100x200/?productivity">
</div>
</div>

<div class="card">
<h3>Chat App</h3>
<div class="images">
<img src="https://source.unsplash.com/100x200/?chat,app">
<img src="https://source.unsplash.com/100x200/?messaging">
<img src="https://source.unsplash.com/100x200/?conversation">
<img src="https://source.unsplash.com/100x200/?social,app">
<img src="https://source.unsplash.com/100x200/?phone,chat">
</div>
</div>

<div class="card">
<h3>ToDo App</h3>
<div class="images">
<img src="https://source.unsplash.com/100x200/?todo">
<img src="https://source.unsplash.com/100x200/?checklist">
<img src="https://source.unsplash.com/100x200/?tasks">
<img src="https://source.unsplash.com/100x200/?planner">
<img src="https://source.unsplash.com/100x200/?productivity,app">
</div>
</div>

</div>
</section>

<section id="contact">
<h2>Contact Me</h2>

<form id="form" action="https://formspree.io/f/mvzdvrkp" method="POST">

<input type="hidden" name="_subject" value="New Client Message!">
<input type="hidden" name="_captcha" value="false">

<input type="text" name="name" placeholder="Your Name" required><br>
<input type="email" name="email" placeholder="Your Email" required><br>
<textarea name="message" placeholder="Your Message" required></textarea><br>

<button type="submit">Send Message</button>

<p class="success" id="successMsg" style="display:none;">
Message sent successfully ✅
</p>

</form>

</section>

<a class="whatsapp" href="https://wa.me/918122888622" target="_blank">💬</a>

<script>
const form = document.getElementById("form");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", function() {
  setTimeout(() => {
    successMsg.style.display = "block";
  }, 1000);
});
</script>

</body>
</html>
